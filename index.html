<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harsh's Portfolio</title>
    <link rel="stylesheet" href="output.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
    />
  </head>
  <body>
    <nav
      id="navbar"
      class="flex sticky top-0 left-0 right-0 bg-white p-4 z-10 justify-between"
    >
      <a href="#"> <span class="text-xl font-display"> harshmpatil </span></a>
      <button>
        <i class="fa-solid fa-bars text-gray-600"></i>
      </button>
    </nav>

    <!--main section-->
    <main>
      <!--hero section-->
      <div
        class="min-h-screen bg-gradient-to-b from-purple-50 via-orange-50 to-transparent"
      >
        <!--Hero container-->
        <div
          class="max-w-4xl mx-auto px-6 pt-10 pb-32 flex flex-col sm:items-center sm:text-center sm:pt-12"
        >
          <div
            id="location"
            class="flex my-6 gap-2 items-center px-3 py-1 rounded-lg border border-orange-300 bg-orange-50 w-fit shadow hover:shadow-md transition hover:-translate-y-1"
          >
            <p class="text-orange-800">Based In Maharashtra,India</p>
          </div>

          <h1
            class="text-4xl group font-medium mt-4 md:text-5xl lg:text-6xl text-gray-900"
          >
            Hi, I’m Harshwardhan Patil
            <span
              class="inline-block group-hover:-translate-y-5 group-hover:translate-x-5 transition duration-300"
              >🚀</span
            >
          </h1>
          <p class="text-xl mt-4 text-gray-800 sm:text-2xl">
            I love building things for the web. Scroll down to see my work.
          </p>

          <div
            id="btns-container"
            class="mt-12 font-display font-medium flex flex-col gap-4 sm:flex-row"
          >
            <button
              class="px-8 py-3 rounded-lg bg-primary text-white hover:bg-opacity-90"
            >
              See My Work
            </button>
            <a
              href="https://drive.google.com/drive/folders/1w2X_b9puGmLxai6sB3KY07Qofc6krvan"
              target="_blank"
              class="px-8 py-3 rounded-lg border hover:border-gray-500 flex items-center justify-center"
            >
              <i class="fa-solid fa-download px-3"></i>
              Download Resume
            </a>
          </div>
        </div>

        <div id="skills-container" class="flex flex-col gap-8">
          <div id="skills-title" class="flex justify-center gap-2">
            <img class="translate-y-2" src="./assets/asset 2.svg" alt="arrow" />
            <span class="font-medium text-2xl">Skills</span>
            <img
              class="translate-y-2 -scale-x-100"
              src="./assets/asset 2.svg"
              alt="arrow"
            />
          </div>

          <div
            id="lines-group"
            class="flex px-6 flex-cols gap-4 overflow-x-hidden"
          >
            <div
              id="skills-list"
              class="flex gap-4 p-6 max-w-8xl flex-wrap justify-center mx-auto items-center transition-transform ease-linear"
            >
              <!-- React -->
              <div
                class="flex flex-col gap-2 min-w-24 min-h-24 items-center hover:-translate-y-2 hover:shadow-lg duration-300 justify-center bg-white rounded-xl border-gray-300 border md:min-h-32 md:min-w-32 hover:bg-gradient-to-br hover:from-red-50 hover:via-purple-50 hover:to-yellow-50 hover:border-gray-600 transition"
              >
                <img
                  src="https://skillicons.dev/icons?i=react"
                  class="w-12 h-12 md:h-16 md:w-16"
                />
                <span class="text-[12px] md:text-[16px] font-semibold">
                  React
                </span>
              </div>

              <!-- Next.js -->
              <div
                class="flex flex-col min-w-24 gap-2 min-h-24 items-center justify-center bg-white rounded-xl border-gray-300 border md:min-h-32 md:min-w-32 hover:bg-gradient-to-br hover:from-red-50 hover:via-purple-50 hover:to-yellow-50 hover:border-gray-600 transition"
              >
                <img
                  src="https://skillicons.dev/icons?i=nextjs"
                  class="w-12 h-12 md:h-16 md:w-16"
                />
                <span class="text-[12px] md:text-[16px] font-semibold">
                  Next.js
                </span>
              </div>

              <!-- TypeScript -->

                class="flex flex-col min-w-24 min-h-24 gap-2 items-center justify-center bg-white rounded-xl border-gray-300 border md:min-h-32 md:min-w-32 hover:bg-gradient-to-br hover:from-red-50 hover:via-purple-50 hover:to-yellow-50 hover:border-gray-600 transition"
              >
                <img
                  src="https://skillicons.dev/icons?i=ts"
                  class="w-12 h-12 md:h-16 md:w-16"
                />
                <span class="text-[12px] md:text-[16px] font-semibold">
                  TypeScript
                </span>
              </div>

              <!-- Node.js -->
              <div
                class="flex flex-col min-w-24 min-h-24 gap-2 items-center justify-center bg-white rounded-xl border-gray-300 border md:min-h-32 md:min-w-32 hover:bg-gradient-to-br hover:from-red-50 hover:via-purple-50 hover:to-yellow-50 hover:border-gray-600 transition"

                <img
                  src="https://skillicons.dev/icons?i=nodejs"
                  class="w-12 h-12 md:h-16 md:w-16"
                />
                <span class="text-[12px] md:text-[16px] font-semibold">
                  Node.js
                </span>
              </div>

              <!-- TailwindCSS -->
              <div
                class="flex flex-col min-w-24 min-h-24 gap-2 items-center justify-center bg-white rounded-xl border-gray-300 border md:min-h-32 md:min-w-32 hover:bg-gradient-to-br hover:from-red-50 hover:via-purple-50 hover:to-yellow-50 hover:border-gray-600 transition"
              >
                <img
                  src="https://skillicons.dev/icons?i=tailwind"
                  class="w-12 h-12 md:h-16 md:w-16"
                />
                <span class="text-[12px] md:text-[16px] font-semibold">
                  TailwindCSS
                </span>
              </div>

              <!-- Express -->
              <div
                class="flex flex-col min-w-24 min-h-24 gap-2 items-center justify-center bg-white rounded-xl border-gray-300 border md:min-h-32 md:min-w-32 hover:bg-gradient-to-br hover:from-red-50 hover:via-purple-50 hover:to-yellow-50 hover:border-gray-600 transition"
              >
                <img
                  src="https://skillicons.dev/icons?i=express"
                  class="w-12 h-12 md:h-16 md:w-16"
                />
                <span class="text-[12px] md:text-[16px] font-semibold">
                  Express
                </span>
              </div>

              <!-- JavaScript -->
              <div
                class="flex flex-col min-w-24 min-h-24 gap-2 items-center justify-center bg-white rounded-xl border-gray-300 border md:min-h-32 md:min-w-32 hover:bg-gradient-to-br hover:from-red-50 hover:via-purple-50 hover:to-yellow-50 hover:border-gray-600 transition"
              >
                <img
                  src="https://skillicons.dev/icons?i=js"

                />
                <span class="text-[12px] md:text-[16px] font-semibold">

              </div>

              <!-- MongoDB -->

                class="flex flex-col min-w-24 min-h-24 gap-2 items-center justify-center bg-white rounded-xl border-gray-300 border md:min-h-32 md:min-w-32 hover:bg-gradient-to-br hover:from-red-50 hover:via-purple-50 hover:to-yellow-50 hover:border-gray-600 transition"

                <img

                class="flex flex-col min-w-24 min-h-24 items-center gap-2 justify-center bg-white rounded-xl border-gray-300 border md:min-h-32 md:min-w-32 hover:bg-gradient-to-br hover:from-red-50 hover:via-purple-50 hover:to-yellow-50 hover:border-gray-600 transition"
              >
                <img
                  src="https://skillicons.dev/icons?i=java"
                  class="w-12 h-12 md:h-16 md:w-16"
                />
                <span class="text-[12px] md:text-[16px] font-semibold">
                  Java

              </div>
              <div
                class="flex flex-col min-w-24 min-h-24 items-center gap-2 justify-center bg-white rounded-xl border-gray-300 border md:min-h-32 md:min-w-32 hover:bg-gradient-to-br hover:from-red-50 hover:via-purple-50 hover:to-yellow-50 hover:border-gray-600 transition"
              >
                <img
                  src="https://skillicons.dev/icons?i=postgres"
                  class="w-12 h-12 md:h-16 md:w-16"
                />
                <span class="text-[12px] md:text-[16px] font-semibold">
                  SQL
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
